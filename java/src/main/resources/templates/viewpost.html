<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{layout :: head(${post.title})}"></head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><span th:utext="${breadcrumb}">path</span></li>
        </ol>
    </nav>
    <h2 th:text="${post.title}">Post Title</h2>
    <p class="text-muted">
        Posted by <strong th:text="${post.user.username}">author</strong>
        &mdash; <span th:text="${post.timeString}">time</span>
    </p>
    <div class="card mb-4">
        <div class="card-body" th:text="${post.content}">Content here</div>
    </div>
    <div class="mb-4">
    <div class="d-flex flex-wrap mb-2">
        <span class="badge badge-pill badge-light mr-2 mb-2"
              th:each="entry : ${reactionCounts.entrySet()}">
            <span th:text="${entry.key}">👍</span>
            <span th:text="${entry.value}">1</span>
        </span>
    </div>

    <div sec:authorize="isAuthenticated()" class="mb-3">
        <form th:action="@{/action_reaction(post=${post.id})}"
              method="post"
              class="d-flex flex-wrap">
            <button type="submit" name="emoji" value="👍" class="btn btn-outline-secondary btn-sm mr-2 mb-2">👍</button>
            <button type="submit" name="emoji" value="👎" class="btn btn-outline-secondary btn-sm mr-2 mb-2">👎</button>
            <button type="submit" name="emoji" value="❤️" class="btn btn-outline-secondary btn-sm mr-2 mb-2">❤️</button>
            <button type="submit" name="emoji" value="😂" class="btn btn-outline-secondary btn-sm mr-2 mb-2">😂</button>
            <button type="submit" name="emoji" value="😮" class="btn btn-outline-secondary btn-sm mr-2 mb-2">😮</button>
            <button type="submit" name="emoji" value="😢" class="btn btn-outline-secondary btn-sm mr-2 mb-2">😢</button>
            <button type="submit" name="emoji" value="😡" class="btn btn-outline-secondary btn-sm mr-2 mb-2">😡</button>
        </form>
    </div>
</div>
    <h5>Comments (<span th:text="${#lists.size(comments)}">0</span>)</h5>
    <div th:each="comment : ${comments}" class="card mb-3">
    <div class="card-body">

        <p th:utext="${@forumService.embedMedia(comment.content)}">
            Comment content
        </p>

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <small class="text-muted">

                by
                <a th:href="@{'/users/' + ${comment.user.username}}"
                   th:text="${comment.user.username}"
                   class="text-white font-weight-bold">
                </a>

                &mdash;
                <span th:text="${comment.timeString}">
                    time
                </span>

                <span class="ml-2"
                      th:each="entry :
                        ${commentReactionCounts.get(comment.id).entrySet()}">

                    <span th:text="${entry.key}">
                        👍
                    </span>

                    <span th:text="${entry.value}">
                        1
                    </span>

                </span>

            </small>

            <div sec:authorize="isAuthenticated()">

                <form th:action="@{/action_comment_reaction(comment=${comment.id})}"
                      method="post"
                      class="d-flex flex-wrap">

                    <button type="submit" name="emoji" value="👍"
                            class="btn btn-outline-secondary btn-sm mr-1 mb-1">👍</button>

                    <button type="submit" name="emoji" value="❤️"
                            class="btn btn-outline-secondary btn-sm mr-1 mb-1">❤️</button>

                    <button type="submit" name="emoji" value="😂"
                            class="btn btn-outline-secondary btn-sm mr-1 mb-1">😂</button>

                    <button type="submit" name="emoji" value="😮"
                            class="btn btn-outline-secondary btn-sm mr-1 mb-1">😮</button>

                    <button type="submit" name="emoji" value="😢"
                            class="btn btn-outline-secondary btn-sm mr-1 mb-1">😢</button>

                    <button type="submit" name="emoji" value="😡"
                            class="btn btn-outline-secondary btn-sm mr-1 mb-1">😡</button>

                </form>

            </div>

        </div>

    </div>
</div>
    <div th:if="${comments.isEmpty()}" class="text-muted">No comments yet.</div>
    <div sec:authorize="isAuthenticated()" class="mt-4">
        <h5>Add a Comment</h5>
        <form th:action="@{/action_comment(post=${post.id})}" method="post">
            <div class="form-group">
                <textarea name="content" class="form-control" rows="4" required
                          placeholder="Write your comment here..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit Comment</button>
        </form>
    </div>
    <div sec:authorize="!isAuthenticated()" class="mt-4 text-muted">
        <a th:href="@{/loginform}">Login</a> to post a comment.
    </div>
</div>
</body>
</html>
